services:
  postgres:
    image: postgres:16-alpine
    container_name: vovinam-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vovinam_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - vovinam_erp_postgres_data:/var/lib/postgresql/data

volumes:
  vovinam_erp_postgres_data:
